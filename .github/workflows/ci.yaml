# Based on augentic/.github/.github/workflows/ci.yaml, with an extra checkout of
# augentic/omnia so the temporary [patch.crates-io] path overrides resolve in CI.
name: CI

on:
  push:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  RUSTFLAGS: -Dwarnings
  CARGO_TERM_COLOR: always

jobs:
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: ./.github/actions/checkout-workspace
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --locked --workspace --all-targets --all-features -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - run: cargo +nightly fmt --all --check

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: ./.github/actions/checkout-workspace
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: nextest
      - run: cargo nextest run --locked --tests --all-features --no-tests=pass

  test-doc:
    name: Test docs
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: ./.github/actions/checkout-workspace
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - id: lib
        run: |
          has_lib=$(cargo metadata --format-version 1 --no-deps \
            | jq '[.packages[].targets[].kind[]
                   | select(IN("lib","rlib","cdylib","dylib","staticlib","proc-macro"))]
                   | length > 0')
          echo "exists=$has_lib" >> "$GITHUB_OUTPUT"
      - if: steps.lib.outputs.exists == 'true'
        run: cargo test --doc --locked --all-features --workspace

  doc:
    name: Docs
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      RUSTDOCFLAGS: -Dwarnings
    steps:
      - uses: ./.github/actions/checkout-workspace
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --no-deps --workspace --all-features --locked

  vet:
    name: Vet
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: ./.github/actions/checkout-workspace
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-vet@0.10.2
      - run: cargo vet --locked

  deny:
    name: Deny
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: ./.github/actions/checkout-workspace
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: Cargo.toml
          arguments: --workspace --locked
