# Cursor end-to-end example.
#
# Command mode drives the `ask` guest's `wasi:cli/run` export once; the HTTP
# trigger keeps serving `/mcp/docs` in the background for the spawned
# cursor-agent. Source paths resolve relative to this file. Build both guests
# first (see README.md), then run from the backends repository root:
#
#   cargo run -p examples --example cursor -- run --config examples/cursor/omnia.toml

[[guest]]
id = "ask"
source.path = "../../target/wasm32-wasip2/debug/examples/cursor_wasm.wasm"

[[guest]]
id = "docs"
source.path = "../../../omnia/target/wasm32-wasip2/debug/examples/mcp_wasm.wasm"

# The working tree the `ask` guest lends through `grants.workspace`. `path`
# resolves relative to this manifest's directory; the host preopens it as the
# tree named `.` and resolves the lent descriptor back to it. Create it before
# running (see README.md): `mkdir -p examples/cursor/workspace`.
[[mount]]
name = "."
path = "./workspace"
writable = true

[[route.http]]
prefix = "/ask"
guest = "ask"

[[route.http]]
prefix = "/mcp/docs"
guest = "docs"
